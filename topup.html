<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up Credits</title>

<style>
:root{
    --primary:#38bdf8;
    --bg:#0f172a;
    --panel:#1e293b;
    --text:white;
    --border:#334155;
    --success:#22c55e;
    --danger:#ef4444;
}

body{
    margin:0;
    font-family:'Segoe UI';
    background:var(--bg);
    color:var(--text);
    text-align:center;
}

.box{
    width:380px;
    max-width:88%;
    margin:60px auto;
    background:var(--panel);
    padding:30px;
    border-radius:22px;
    box-shadow:0 8px 25px rgba(0,0,0,0.25);
}

input,select{
    width:90%;
    padding:14px;
    margin:12px 0;
    border-radius:10px;
    border:1px solid var(--border);
    font-size:16px;
}

button{
    padding:13px 22px;
    border:none;
    border-radius:10px;
    background:var(--primary);
    color:white;
    cursor:pointer;
    font-weight:bold;
    margin:8px;
}

.back-btn{
    background:#64748b;
}

.note{
    font-size:14px;
    opacity:0.8;
}

#voucherBox{
    margin-top:20px;
    background:#14532d;
    padding:18px;
    border-radius:15px;
    display:none;
}

#voucherText{
    background:white;
    color:black;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
    margin:12px 0;
    font-size:20px;
}

.request-card{
    background:#111827;
    border:1px solid var(--border);
    border-radius:15px;
    margin-top:15px;
    padding:15px;
    text-align:left;
}

.pending{
    color:#facc15;
    font-weight:bold;
}

.approved{
    color:#22c55e;
    font-weight:bold;
}

#qrBox{
    display:none;
    margin:18px auto;
    background:#020617;
    padding:18px;
    border-radius:18px;
    border:1px solid var(--border);
}

#qrBox img{
    width:300px;
    max-width:100%;
    border-radius:15px;
    background:white;
    padding:10px;
}

.phone-box{
    margin-top:12px;
    background:white;
    color:black;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>

<body>

<div class="box">
    <h1>Top Up Credits</h1>

    <p class="note">Submit a top up request. Admin will approve and generate your voucher code.</p>

    <input id="amount" type="number" placeholder="How many credits?">

    <select id="payment">
        <option value="cash">Cash</option>
        <option value="tng">TNG</option>
        
    </select>
    <div id="qrBox">
        <h3>Scan TNG QR</h3>
        <img src="tng-qr.png" alt="TNG QR Code">

        <p class="note">Or copy phone number (+60) :</p>
        <div class="phone-box" id="phoneNumber">169520713</div>
        <button onclick="copyPhone()">Copy Phone Number</button>
    </div>
    <br>

    <button onclick="submitTopup()">Submit Request</button>
    <button class="back-btn" onclick="window.location.href='Index.html'">Back</button>

    <div id="voucherBox">
        <h3>Your Approved Voucher Code</h3>
        <div id="voucherText"></div>
        <button onclick="copyVoucher()">Copy Code</button>
    </div>

    <h3>Your Requests</h3>
    <div id="requestList"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp,
    query,
    where,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA1fwmPPjNGBw0gGYv6TSWmuZ41aNelzNc",
    authDomain: "technoprenuership-4f49d.firebaseapp.com",
    projectId: "technoprenuership-4f49d",
    storageBucket: "technoprenuership-4f49d.firebasestorage.app",
    messagingSenderId: "679400264773",
    appId: "1:679400264773:web:f27707019e8bf8e9843f2c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let latestVoucher = "";
const paymentSelect = document.getElementById("payment");
const qrBox = document.getElementById("qrBox");

paymentSelect.addEventListener("change", () => {
    if(paymentSelect.value === "tng"){
        qrBox.style.display = "block";
    }else{
        qrBox.style.display = "none";
    }
});

window.copyPhone = () => {
    const phone = document.getElementById("phoneNumber").innerText;
    navigator.clipboard.writeText(phone);
    alert("Phone number copied.");
};

onAuthStateChanged(auth,(user)=>{
    if(!user){
        alert("Please login first.");
        window.location.href = "in.html";
        return;
    }

    currentUser = user;
    listenMyRequests(user.uid);
});

window.submitTopup = async () => {
    if(!currentUser){
        alert("Please login first.");
        return;
    }

    const amount = Number(document.getElementById("amount").value);
    const payment = document.getElementById("payment").value;

    if(!amount || amount <= 0){
        alert("Please enter valid credit amount.");
        return;
    }

    await addDoc(collection(db,"topupRequests"),{
        uid:currentUser.uid,
        email:currentUser.email,
        amount:amount,
        payment:payment,
        status:"pending",
        voucher:"",
        createdAt:serverTimestamp()
    });

    alert("Top up request submitted. Please wait for admin approval.");

    document.getElementById("amount").value = "";
};

function listenMyRequests(uid){
    const q = query(
        collection(db,"topupRequests"),
        where("uid","==",uid)
    );

    onSnapshot(q,(snap)=>{
        const list = document.getElementById("requestList");
        list.innerHTML = "";

        snap.forEach(docu=>{
            const data = docu.data();

            const div = document.createElement("div");
            div.className = "request-card";

            div.innerHTML = `
                <p><b>Amount:</b> ${data.amount} credits</p>
                <p><b>Payment:</b> ${data.payment.toUpperCase()}</p>
                <p><b>Status:</b> 
                    <span class="${data.status === 'approved' ? 'approved' : 'pending'}">
                        ${data.status.toUpperCase()}
                    </span>
                </p>
                ${data.voucher ? `<p><b>Voucher:</b> ${data.voucher}</p>` : ""}
            `;

            list.appendChild(div);

            if(data.status === "approved" && data.voucher){
                latestVoucher = data.voucher;

                document.getElementById("voucherBox").style.display = "block";
                document.getElementById("voucherText").innerText = data.voucher;
            }
        });
    });
}

window.copyVoucher = () => {
    if(!latestVoucher){
        alert("No voucher code yet.");
        return;
    }

    navigator.clipboard.writeText(latestVoucher);
    alert("Voucher copied. Go back and redeem it.");
};


</script>

</body>
</html>
