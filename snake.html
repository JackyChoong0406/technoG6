<!DOCTYPE html>
<html>
<head>
  <title>Snake Game - Universal UI</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html, body { height: 100%; margin: 0; touch-action: none; overflow: hidden; background: #0f172a; } 
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: 'Segoe UI', sans-serif; }
    .game-container { position: relative; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    canvas { border: 4px solid #334155; background: #000; width: 400px; height: 400px; max-width: 90vw; max-height: 70vh; box-shadow: 0 0 30px rgba(0,0,0,0.7); }
    #start-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: rgba(15, 23, 42, 0.98); border: 2px solid #38bdf8; border-radius: 12px; padding: 25px; text-align: center; z-index: 10; }
    button { background: #22c55e; border: none; padding: 12px 24px; color: white; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; }
    .stats { font-family: monospace; font-size: 1.2rem; margin-bottom: 5px; color: #38bdf8; }
    ul { text-align: left; font-size: 0.85rem; color: #94a3b8; padding-left: 20px; }
  </style>
</head>
<body>

<div class="game-container">
  <div class="stats">
    Score: <span id="ui-score">0</span> | Goal: <span id="ui-goal">...</span>
  </div>

  <div id="start-menu">
    <h2 style="margin: 0 0 10px 0; color: #38bdf8;">SNAKE MISSION</h2>
    <ul>
      <li><b>PC:</b> Use Arrow Keys to move</li>
      <li><b>Mobile:</b> Swipe to move</li>
      <li>Eat red apples to reach the goal</li>
    </ul>
    <p>Target: <span id="goal-text" style="color:#22c55e; font-weight:bold;">...</span></p>
    <button id="start-btn">START GAME</button>
  </div>
  
  <canvas width="400" height="400" id="game"></canvas>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyA1fwmPPjNGBw0gGYv6TSWmuZ41aNelzNc",
    authDomain: "technoprenuership-4f49d.firebaseapp.com",
    projectId: "technoprenuership-4f49d",
    storageBucket: "technoprenuership-4f49d.firebasestorage.app",
    messagingSenderId: "679400264773",
    appId: "1:679400264773:web:f27707019e8bf8e9843f2c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

onAuthStateChanged(auth, (user) => {
    if (!user) {
        alert("Not logged in!");
        window.location.href = "Index.html";
        return;
    }
    currentUser = user;
});

// URL Parameters
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('uid');
const levelId = urlParams.get('id');
const levelNum = parseInt(levelId, 10);
const minGoal = parseInt(urlParams.get('min')) || 5; 

document.getElementById('goal-text').innerText = minGoal;
document.getElementById('ui-goal').innerText = minGoal;

var canvas = document.getElementById('game');
var context = canvas.getContext('2d');
var grid = 16;
var count = 0;
var score = 0;
var isSaving = false;
var isSavingProgress = false;
var gameRunning = false;
var levelCleared = false;
var saveProgressPromise = null;

var snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [], maxCells: 4 };
var apple = { x: 320, y: 320 };

function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-menu').style.display = 'none';
  gameRunning = true;
  resetGame();
  requestAnimationFrame(loop);
});

function resetGame() {
  score = 0;
  count = 0;
  gameRunning = true;
  levelCleared = false;
  isSaving = false;
  isSavingProgress = false;
  saveProgressPromise = null;
  document.getElementById('ui-score').innerText = "0";
  snake.x = 160; snake.y = 160;
  snake.cells = []; snake.maxCells = 4;
  snake.dx = grid; snake.dy = 0;
  apple.x = getRandomInt(0, 25) * grid;
  apple.y = getRandomInt(0, 25) * grid;
}

async function finish() {
    if (isSaving) return;
    isSaving = true;

    if (!currentUser || !levelId) { 
        window.location.href = 'Index.html'; 
        return; 
    }

    try {
        const userRef = doc(db, "users", currentUser.uid);
        const snap = await getDoc(userRef);

        if (snap.exists()) {
            let d = snap.data();
            let s = d.scores || {};

            if (!s[levelId] || score > s[levelId]) {
                s[levelId] = score;
            }

            let currentUnlocked = Number(s.unlockedLevel || 1);

            if (score >= minGoal && currentUnlocked === Number(levelId)) {
                s.unlockedLevel = Number(levelId) + 1;
            }

            await updateDoc(userRef, { 
                scores: s
            });
        }

    } catch (e) { 
        console.error("Firebase Error:", e); 
    }

    window.location.href = 'Index.html';
}

async function saveProgressIfCleared() {
    if (levelCleared || !currentUser || isNaN(levelNum) || score < minGoal || isSavingProgress) return;

    isSavingProgress = true;
    saveProgressPromise = (async () => {
        try {
            const userRef = doc(db, "users", currentUser.uid);
            const snap = await getDoc(userRef);

            if (snap.exists()) {
                let data = snap.data();
                let s = data.scores || {};
                let currentUnlocked = Number(s.unlockedLevel || 1);

                if (!s[levelId] || score > s[levelId]) {
                    s[levelId] = score;
                }

                if (currentUnlocked === levelNum) {
                    s.unlockedLevel = levelNum + 1;
                }

                await updateDoc(userRef, { scores: s });
                levelCleared = true;
            }
        } catch (e) {
            console.error("Firebase Error:", e);
        } finally {
            isSavingProgress = false;
            saveProgressPromise = null;
        }
    })();

    return saveProgressPromise;
}

function loop() {
  if (!gameRunning) return;
  requestAnimationFrame(loop);
  
  if (++count < 7) return; 
  count = 0;
  context.clearRect(0,0,canvas.width,canvas.height);

  snake.x += snake.dx;
  snake.y += snake.dy;

  if (snake.x < 0) snake.x = canvas.width - grid;
  else if (snake.x >= canvas.width) snake.x = 0;
  if (snake.y < 0) snake.y = canvas.height - grid;
  else if (snake.y >= canvas.height) snake.y = 0;

  snake.cells.unshift({x: snake.x, y: snake.y});
  if (snake.cells.length > snake.maxCells) snake.cells.pop();

  context.fillStyle = '#f43f5e';
  context.fillRect(apple.x, apple.y, grid-1, grid-1);

  context.fillStyle = '#22c55e';
  snake.cells.forEach(function(cell, index) {
    context.fillRect(cell.x, cell.y, grid-1, grid-1);

    if (cell.x === apple.x && cell.y === apple.y) {
      snake.maxCells++;
      score += 1; 
      document.getElementById('ui-score').innerText = score;
      apple.x = getRandomInt(0, 25) * grid;
      apple.y = getRandomInt(0, 25) * grid;

      if (score >= minGoal) {
        saveProgressIfCleared().catch(console.error);
      }
    }

    for (var i = index + 1; i < snake.cells.length; i++) {
      if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
        gameRunning = false;
        finish();
      }
    }
  });
}

// INPUT CONTROLS
document.addEventListener('keydown', (e) => {
  if (e.which === 37 && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
  else if (e.which === 38 && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
  else if (e.which === 39 && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
  else if (e.which === 40 && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
});

let touchStartX = 0;
let touchStartY = 0;
document.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
    let touchEndX = e.changedTouches[0].screenX;
    let touchEndY = e.changedTouches[0].screenY;
    const diffX = touchEndX - touchStartX;
    const diffY = touchEndY - touchStartY;
    if (Math.abs(diffX) > 20 || Math.abs(diffY) > 20) {
        if (Math.abs(diffX) > Math.abs(diffY)) {
            if (diffX > 0 && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
            else if (diffX < 0 && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
        } else {
            if (diffY > 0 && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
            else if (diffY < 0 && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
        }
    }
}, { passive: true });
</script>
</body>
</html>
