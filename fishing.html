<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fishing Tension Game</title>
<style>
  body {
    margin: 0;
    background: #071427;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  canvas {
    display: block;
    margin: auto;
    background: #0b4a75;
    cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="1400" height="800"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

// ==========================
// IMAGE LOADING
// ==========================
const hookImg = new Image();
hookImg.src = "hook.png";

const iceImg = new Image();
iceImg.src = "ice.png";

const fishImgs = [
  "fish1.png",
  "fish2.png",
  "fish3.png",
  "fish4.png"
].map(src => {
  const img = new Image();
  img.src = src;
  return img;
});

// ==========================
// GAME STATE
// ==========================
let gameState = "rules";
let rulePage = 0;

let score = 0;
let lives = 3;

let objects = [];
let caughtObj = null;

let hookLength = 80;
let hookDropped = false;
let hookReturning = false;
let angle = 0;
let angleSpeed = 0.03;

let gameOver = false;
let startTicks = Date.now();
let totalGameTime = 45;
let remaining = totalGameTime;

let effectText = "";
let effectTimer = 0;

let comboText = "";
let comboTimer = 0;

// ==========================
// FREEZE SYSTEM
// ==========================
let frozen = false;
let freezeStart = 0;
let freezeDuration = 5000;
let totalFrozenTime = 0;

// ==========================
// TENSION SYSTEM
// ==========================
let spaceHeld = false;
let tension = 50;
let tensionDir = 1;
let reeling = false;
let tensionSuccessTime = 0;

let safeMin = 40;
let safeMax = 70;

// ==========================
// BOMB SYSTEM
// ==========================
let explosions = [];
let explosionRadius = 320;

// ==========================
// RULE BUTTON
// ==========================
const ruleButton = {
  x: WIDTH / 2 - 160,
  y: 640,
  w: 320,
  h: 60
};

// ==========================
// OBJECT CLASS
// ==========================
class GameObject {
  constructor(type) {
    this.type = type;
    this.caught = false;

    if (type === "fish") {
      this.image = fishImgs[Math.floor(Math.random() * fishImgs.length)];

      this.width = 130;
      this.height = 90;
      this.speed = 2.5;
      this.score = 5;

      if (this.image.src.includes("fish4.png")) {
        this.width = 200;
        this.height = 130;
        this.score = 10;
      }
    }

    if (type === "bomb") {
      this.width = 70;
      this.height = 70;
      this.speed = 2.5;
      this.score = 0;
    }

    if (type === "ice") {
      this.width = 75;
      this.height = 75;
      this.speed = 2.5;
      this.score = 0;
    }

    this.x = -this.width - Math.random() * 500;
    this.y = 200 + Math.random() * (HEIGHT - 330);
    this.dir = 1;
  }

  move() {
    if (this.caught) return;
    if (frozen && this.type === "fish") return;

    this.x += this.speed * this.dir;

    if (this.x > WIDTH + this.width) {
      this.x = -this.width - Math.random() * 500;
      this.y = 200 + Math.random() * (HEIGHT - 330);
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x + this.width / 2, this.y + this.height / 2);

    if (this.type === "fish") {
      ctx.scale(-1, 1);

      ctx.drawImage(
        this.image,
        -this.width / 2,
        -this.height / 2,
        this.width,
        this.height
      );
    }

    if (this.type === "bomb") {
      drawBomb(-this.width / 2, -this.height / 2, this.width, this.height);
    }

    if (this.type === "ice") {
      ctx.drawImage(
        iceImg,
        -this.width / 2,
        -this.height / 2,
        this.width,
        this.height
      );
    }

    ctx.restore();
  }

  rect() {
    return {
      x: this.x,
      y: this.y,
      w: this.width,
      h: this.height
    };
  }
}

// ==========================
// CREATE OBJECTS
// ==========================
function createObjects() {
  const arr = [];

  for (let i = 0; i < 8; i++) {
    arr.push(new GameObject("fish"));
  }

  for (let i = 0; i < 2; i++) {
    arr.push(new GameObject("bomb"));
  }

  for (let i = 0; i < 2; i++) {
    arr.push(new GameObject("ice"));
  }

  return arr;
}

function refillObjects() {
  while (objects.filter(o => o.type === "fish").length < 8) {
    objects.push(new GameObject("fish"));
  }

  while (objects.filter(o => o.type === "bomb").length < 2) {
    objects.push(new GameObject("bomb"));
  }

  while (objects.filter(o => o.type === "ice").length < 2) {
    objects.push(new GameObject("ice"));
  }
}

// ==========================
// RESET
// ==========================
function resetGame() {
  score = 0;
  lives = 3;
  objects = createObjects();

  caughtObj = null;
  hookLength = 80;
  hookDropped = false;
  hookReturning = false;

  angle = 0;
  angleSpeed = 0.03;

  gameOver = false;
  startTicks = Date.now();
  totalFrozenTime = 0;
  frozen = false;

  effectText = "";
  effectTimer = 0;

  comboText = "";
  comboTimer = 0;

  spaceHeld = false;
  tension = 50;
  tensionDir = 1;
  reeling = false;
  tensionSuccessTime = 0;

  safeMin = 40;
  safeMax = 70;

  explosions = [];
}

// ==========================
// DRAW BACKGROUND
// ==========================
function drawOcean() {
  const gradient = ctx.createLinearGradient(0, 0, 0, HEIGHT);
  gradient.addColorStop(0, "#2a9df4");
  gradient.addColorStop(1, "#023e8a");

  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
}

// ==========================
// DRAW BOMB
// ==========================
function drawBomb(x, y, w, h) {
  ctx.fillStyle = "#222";

  ctx.beginPath();
  ctx.arc(x + w / 2, y + h / 2, w * 0.35, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#ffb703";
  ctx.lineWidth = 4;

  ctx.beginPath();
  ctx.moveTo(x + w / 2, y + h * 0.25);
  ctx.lineTo(x + w * 0.75, y + h * 0.05);
  ctx.stroke();

  ctx.fillStyle = "#ffb703";
  ctx.beginPath();
  ctx.arc(x + w * 0.78, y + h * 0.05, 6, 0, Math.PI * 2);
  ctx.fill();
}

// ==========================
// DRAW HOOK
// ==========================
function drawHook(hookX, hookY) {
  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(WIDTH / 2, 0);
  ctx.lineTo(hookX, hookY);
  ctx.stroke();

  ctx.drawImage(hookImg, hookX - 30, hookY - 30, 60, 60);
}

// ==========================
// TENSION BAR
// ==========================
function drawTensionBar() {
  const x = 1000;
  const y = 40;
  const w = 300;
  const h = 30;

  ctx.fillStyle = "#ff4d4d";
  ctx.fillRect(x, y, w, h);

  ctx.fillStyle = "#52ff52";
  ctx.fillRect(
    x + safeMin / 100 * w,
    y,
    (safeMax - safeMin) / 100 * w,
    h
  );

  ctx.fillStyle = "white";
  ctx.fillRect(x + tension / 100 * w - 4, y - 5, 8, h + 10);

  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);

  ctx.fillStyle = "white";
  ctx.font = "22px Arial";
  ctx.fillText("Tension", x, y + 65);

  ctx.font = "18px Arial";
  ctx.fillText("Hold / release SPACE", x, y + 90);
}

// ==========================
// RANDOM TENSION RANGE
// ==========================
function setRandomTensionRange(type) {
  if (type === "bomb") {
    safeMin = 40 + Math.random() * 20;
    safeMax = safeMin + 10;
  } else if (type === "ice") {
    safeMin = 35 + Math.random() * 25;
    safeMax = safeMin + 18;
  } else {
    safeMin = 30 + Math.random() * 30;
    safeMax = safeMin + 25;
  }

  if (safeMax > 95) {
    safeMax = 95;

    if (type === "bomb") safeMin = safeMax - 10;
    else if (type === "ice") safeMin = safeMax - 18;
    else safeMin = safeMax - 25;
  }
}

// ==========================
// UPDATE TENSION
// ==========================
function updateTension() {
  if (!reeling || !caughtObj) return;

  if (spaceHeld) {
    tension += 1.2;
  } else {
    tension -= 1.0;
  }

  tension += tensionDir * 0.6;

  if (tension >= 100) {
    tension = 100;
    tensionDir = -1;
  }

  if (tension <= 0) {
    tension = 0;
    tensionDir = 1;
  }

  if (tension >= safeMin && tension <= safeMax) {
    tensionSuccessTime += 16;
  } else {
    tensionSuccessTime -= 25;
  }

  tensionSuccessTime = Math.max(0, tensionSuccessTime);

  if (tensionSuccessTime >= 1200) {
    if (caughtObj.type === "fish") {
      score += caughtObj.score;
      effectText = `+${caughtObj.score} Score!`;

      objects.splice(objects.indexOf(caughtObj), 1);
      objects.push(new GameObject("fish"));
    }

    if (caughtObj.type === "bomb") {
      triggerExplosion(
        caughtObj.x + caughtObj.width / 2,
        caughtObj.y + caughtObj.height / 2
      );
    }

    if (caughtObj.type === "ice") {
      activateFreeze();

      objects.splice(objects.indexOf(caughtObj), 1);
      objects.push(new GameObject("ice"));
    }

    effectTimer = Date.now();
    resetHookAfterCatch();
    refillObjects();
  }

  if (tension <= 0 || tension >= 100) {
    effectText = "Escaped!";
    effectTimer = Date.now();

    caughtObj.caught = false;
    resetHookAfterCatch();
  }
}

// ==========================
// FREEZE EFFECT
// ==========================
function activateFreeze() {
  if (!frozen) {
    frozen = true;
    freezeStart = Date.now();
  } else {
    freezeStart = Date.now();
  }

  effectText = "ICE! Fish and timer frozen!";
  effectTimer = Date.now();
}

function updateFreeze() {
  if (!frozen) return;

  if (Date.now() - freezeStart >= freezeDuration) {
    frozen = false;
    totalFrozenTime += freezeDuration;
  }
}

// ==========================
// CHAIN EXPLOSION
// ==========================
function triggerExplosion(originX, originY) {
  explosions.push({
    x: originX,
    y: originY,
    start: Date.now()
  });

  let destroyed = 0;
  let triggeredBombs = [];
  let triggeredIce = false;

  objects = objects.filter(obj => {
    const ox = obj.x + obj.width / 2;
    const oy = obj.y + obj.height / 2;
    const dist = Math.sqrt((ox - originX) ** 2 + (oy - originY) ** 2);

    if (dist <= explosionRadius) {
      if (obj === caughtObj) {
        return false;
      }

      if (obj.type === "fish") {
        destroyed++;
        return false;
      }

      if (obj.type === "bomb") {
        triggeredBombs.push({ x: ox, y: oy });
        return false;
      }

      if (obj.type === "ice") {
        triggeredIce = true;
        return false;
      }
    }

    return true;
  });

  if (triggeredIce) {
    activateFreeze();
  }

  for (const bomb of triggeredBombs) {
    setTimeout(() => {
      triggerExplosion(bomb.x, bomb.y);
    }, 150);
  }

  let multiplier = 1;

  if (destroyed >= 3) multiplier = 2;
  if (destroyed >= 5) multiplier = 3;
  if (destroyed >= 7) multiplier = 4;

  const gained = destroyed * 3 * multiplier;

  score += gained;

  effectText = `BOOM! +${gained}`;
  comboText = destroyed > 1
    ? `${destroyed} Chain Combo x${multiplier}`
    : triggeredBombs.length > 0
      ? "Bomb Chain!"
      : "";

  comboTimer = Date.now();
  effectTimer = Date.now();

  refillObjects();
}

// ==========================
// RESET HOOK
// ==========================
function resetHookAfterCatch() {
  caughtObj = null;
  reeling = false;
  hookDropped = false;
  hookReturning = false;
  hookLength = 80;
  tensionSuccessTime = 0;
  tension = 50;
}

// ==========================
// COLLISION
// ==========================
function rectsCollide(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

// ==========================
// TEXT
// ==========================
function drawCenteredText(text, y, size = 26, color = "white") {
  ctx.fillStyle = color;
  ctx.font = `${size}px Arial`;
  const w = ctx.measureText(text).width;
  ctx.fillText(text, WIDTH / 2 - w / 2, y);
}

// ==========================
// RULE BUTTON DRAW
// ==========================
function drawRuleButton(text) {
  ctx.fillStyle = "#ffcc00";
  roundRect(ruleButton.x, ruleButton.y, ruleButton.w, ruleButton.h, 18);

  ctx.strokeStyle = "white";
  ctx.lineWidth = 3;
  ctx.strokeRect(ruleButton.x, ruleButton.y, ruleButton.w, ruleButton.h);

  ctx.fillStyle = "#0f1e3c";
  ctx.font = "30px Arial";
  const textWidth = ctx.measureText(text).width;
  ctx.fillText(
    text,
    ruleButton.x + ruleButton.w / 2 - textWidth / 2,
    ruleButton.y + 40
  );
}

// ==========================
// RULES
// ==========================
function drawRules() {
  ctx.fillStyle = "#0f1e3c";
  roundRect(200, 100, 1000, 600, 20);

  drawCenteredText("Fishing Tension Game", 160, 50);

  ctx.fillStyle = "white";
  ctx.font = "26px Arial";

  if (rulePage === 0) {
    ctx.fillText("Catch fish using the hook.", 350, 250);
    ctx.fillText("Fish move from LEFT to RIGHT.", 350, 310);
    ctx.fillText("Press SPACE to drop the hook.", 350, 370);
    ctx.fillText("When hooked, hold or release SPACE to control tension.", 350, 430);

    drawRuleButton("NEXT");
  } else {
    ctx.save();
    ctx.translate(410, 255);
    ctx.scale(-1, 1);
    ctx.drawImage(fishImgs[0], -60, -45, 120, 90);
    ctx.restore();

    ctx.fillText("Fish = +5 marks", 530, 270);

    ctx.save();
    ctx.translate(420, 370);
    ctx.scale(-1, 1);
    ctx.drawImage(fishImgs[3], -90, -60, 180, 120);
    ctx.restore();

    ctx.fillText("Large fish = +10 marks", 530, 370);

    drawBomb(380, 460, 70, 70);
    ctx.fillText("Bomb = explosion combo + chain", 530, 500);

    ctx.drawImage(iceImg, 375, 550, 80, 80);
    ctx.fillText("Ice = freeze fish and timer", 530, 600);

    drawRuleButton("START");
  }
}

// ==========================
// ROUND RECT
// ==========================
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

// ==========================
// EXPLOSION ANIMATION
// ==========================
function drawExplosionAnimation() {
  const duration = 650;
  const now = Date.now();

  explosions = explosions.filter(explosion => {
    const progress = (now - explosion.start) / duration;

    if (progress >= 1) {
      return false;
    }

    const radius = explosionRadius * progress;
    const alpha = 1 - progress;

    ctx.strokeStyle = `rgba(255,180,0,${alpha})`;
    ctx.lineWidth = 8;

    ctx.beginPath();
    ctx.arc(explosion.x, explosion.y, radius, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = `rgba(255,100,0,${0.35 * alpha})`;
    ctx.beginPath();
    ctx.arc(explosion.x, explosion.y, radius, 0, Math.PI * 2);
    ctx.fill();

    for (let i = 0; i < 14; i++) {
      const a = (Math.PI * 2 / 14) * i;
      const sparkX = explosion.x + Math.cos(a) * radius;
      const sparkY = explosion.y + Math.sin(a) * radius;

      ctx.fillStyle = `rgba(255,230,80,${alpha})`;
      ctx.beginPath();
      ctx.arc(sparkX, sparkY, 6, 0, Math.PI * 2);
      ctx.fill();
    }

    return true;
  });
}

// ==========================
// GAME LOOP
// ==========================
function gameLoop() {
  drawOcean();

  if (gameState === "rules") {
    drawRules();
    requestAnimationFrame(gameLoop);
    return;
  }

  updateFreeze();

  let elapsed;

  if (frozen) {
    elapsed = (freezeStart - startTicks - totalFrozenTime) / 1000;
  } else {
    elapsed = (Date.now() - startTicks - totalFrozenTime) / 1000;
  }

  remaining = Math.max(0, Math.floor(totalGameTime - elapsed));

  if ((remaining <= 0 || lives <= 0) && !gameOver) {
    gameOver = true;
  }

  if (!gameOver) {
    if (!hookDropped && !reeling) {
      angle += angleSpeed;

      if (Math.abs(angle) > 1) {
        angleSpeed *= -1;
      }
    } else if (!reeling) {
      if (!caughtObj) {
        if (!hookReturning) {
          hookLength += 8;

          if (hookLength > HEIGHT) {
            hookReturning = true;
          }
        } else {
          hookLength -= 10;
        }
      }

      if (hookLength < 80) {
        hookLength = 80;
        hookDropped = false;
        hookReturning = false;
      }
    }

    updateTension();
  }

  const hookX = Math.floor(WIDTH / 2 + hookLength * Math.sin(angle));
  const hookY = Math.floor(hookLength * Math.cos(angle));

  drawHook(hookX, hookY);

  const hookRect = {
    x: hookX - 15,
    y: hookY - 15,
    w: 30,
    h: 30
  };

  for (const obj of objects) {
    obj.move();

    if (obj.caught) {
      obj.x = hookX - obj.width / 2;
      obj.y = hookY - obj.height / 2;
    }

    obj.draw();

    if (
      rectsCollide(hookRect, obj.rect()) &&
      hookDropped &&
      !caughtObj &&
      !reeling
    ) {
      obj.caught = true;
      caughtObj = obj;
      reeling = true;
      tension = 50;
      tensionSuccessTime = 0;
      setRandomTensionRange(obj.type);

      if (obj.type === "bomb") effectText = "Bomb hooked!";
      else if (obj.type === "ice") effectText = "Ice hooked!";
      else effectText = "Fish hooked!";

      effectTimer = Date.now();
    }
  }

  drawExplosionAnimation();

  ctx.fillStyle = "white";
  ctx.font = "26px Arial";

  ctx.fillText(`Score: ${score}`, 10, 30);
  ctx.fillText(`Time: ${remaining}`, 10, 60);
  ctx.fillText(`Lives: ${lives}`, 10, 90);

  if (frozen) {
    drawCenteredText("FROZEN!", 120, 45, "#a8f0ff");
  }

  if (reeling) {
    drawTensionBar();
    drawCenteredText(
      `Catch Progress: ${Math.floor(tensionSuccessTime / 12)}%`,
      150,
      28,
      "yellow"
    );
  }

  if (effectText) {
    if (Date.now() - effectTimer < 1500) {
      drawCenteredText(effectText, 210, 45, "yellow");
    } else {
      effectText = "";
    }
  }

  if (comboText) {
    if (Date.now() - comboTimer < 1800) {
      drawCenteredText(comboText, 265, 42, "#ffdd00");
    } else {
      comboText = "";
    }
  }

  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    drawCenteredText("GAME OVER", 280, 60);
    drawCenteredText(`Final Score: ${score}`, 360, 36);
    drawCenteredText("Press R to Restart", 440, 30);
  }

  requestAnimationFrame(gameLoop);
}

// ==========================
// KEYBOARD CONTROL
// ==========================
document.addEventListener("keydown", function(event) {
  if (event.code === "Space") {
    spaceHeld = true;
    event.preventDefault();
  }

  if (gameState === "game") {
    if (!gameOver) {
      if (event.code === "Space" && !hookDropped && !reeling) {
        hookDropped = true;
      }
    } else {
      if (event.key.toLowerCase() === "r") {
        resetGame();
      }
    }
  }
});

document.addEventListener("keyup", function(event) {
  if (event.code === "Space") {
    spaceHeld = false;
  }
});

// ==========================
// MOUSE CONTROL FOR RULE PAGE
// ==========================
canvas.addEventListener("click", function(event) {
  if (gameState !== "rules") return;

  const rect = canvas.getBoundingClientRect();
  const mouseX = event.clientX - rect.left;
  const mouseY = event.clientY - rect.top;

  if (
    mouseX >= ruleButton.x &&
    mouseX <= ruleButton.x + ruleButton.w &&
    mouseY >= ruleButton.y &&
    mouseY <= ruleButton.y + ruleButton.h
  ) {
    if (rulePage === 0) {
      rulePage = 1;
    } else {
      gameState = "game";
      resetGame();
    }
  }
});

objects = createObjects();
gameLoop();
</script>

</body>
</html>
